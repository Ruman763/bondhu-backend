<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bondhu Password Reset</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 16px;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 12px;
        padding: 20px;
      }
      h1 {
        margin-top: 0;
        font-size: 22px;
      }
      p {
        color: #94a3b8;
      }
      label {
        display: block;
        margin: 12px 0 6px;
        font-size: 14px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #0b1220;
        color: #e2e8f0;
      }
      button {
        margin-top: 16px;
        width: 100%;
        padding: 10px 12px;
        border: 0;
        border-radius: 8px;
        cursor: pointer;
        background: #2563eb;
        color: white;
        font-weight: 600;
      }
      .status {
        margin-top: 12px;
        font-size: 14px;
      }
      .ok {
        color: #22c55e;
      }
      .err {
        color: #f87171;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Reset your password</h1>
        <p>Enter a new password for your Bondhu account.</p>
        <form id="form">
          <label for="password">New password</label>
          <input id="password" name="password" type="password" minlength="6" required />

          <label for="confirmPassword">Confirm password</label>
          <input id="confirmPassword" name="confirmPassword" type="password" minlength="6" required />

          <button type="submit">Reset Password</button>
        </form>
        <div id="status" class="status"></div>
      </div>
    </div>

    <script>
      const form = document.getElementById('form');
      const statusEl = document.getElementById('status');
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');

      if (!token) {
        statusEl.className = 'status err';
        statusEl.textContent = 'Missing reset token. Please use the full link from your email.';
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        statusEl.className = 'status';
        statusEl.textContent = '';

        if (!token) {
          statusEl.className = 'status err';
          statusEl.textContent = 'Missing reset token.';
          return;
        }

        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (password.length < 6) {
          statusEl.className = 'status err';
          statusEl.textContent = 'Password must be at least 6 characters.';
          return;
        }
        if (password !== confirmPassword) {
          statusEl.className = 'status err';
          statusEl.textContent = 'Passwords do not match.';
          return;
        }

        try {
          const response = await fetch('/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              token,
              newPassword: password,
            }),
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || 'Failed to reset password');
          }

          statusEl.className = 'status ok';
          statusEl.textContent = 'Password reset successful. You can now log in from the app.';
          form.reset();
        } catch (error) {
          statusEl.className = 'status err';
          statusEl.textContent = error.message || 'Failed to reset password';
        }
      });
    </script>
  </body>
</html>
